<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK</title>
    <link rel="stylesheet" href="StyleHome.css">
</head>
<body>
    <!--Seccion 1: Inicio-->
    <section id="Start">
        <h1>ARK</h1>
        <a href="#Closet" class="botoninicio">Armario</a>
    </section>
    
    <!--Seccion 2: Tienda-->
    <section class="Closet" id="Closet">
        <h2>NOX COLLECTION</h2>

        <div class="top-botones">
            <a href="#InfoFinal" class="boton-superior">Nosotros</a>
            <a href="#InfoFinal" class="boton-superior">Contactanos</a>
        </div>

        <div class="filacloset">
            <button class="flecha-izquierda">&#10094</button>
            
            <div class="filaropa" id="filaropa">
                <div class="imagen"><img src="/Images/D1_BlancoMorado.png" data-id="1"></div>
                <div class="imagen"><img src="/Images/D2_BlancoMorado.png" data-id="2"></div>
                <div class="imagen"><img src="/Images/D3_BlancoMorado.png" data-id="3"></div>
                <div class="imagen"><img src="/Images/D4_BlancoMorado.png" data-id="4"></div>
                <div class="imagen"><img src="/Images/D5_BlancoMorado.png" data-id="5"></div>
                <div class="imagen"><img src="/Images/D6_BlancoMorado.png" data-id="6"></div>
                <div class="imagen"><img src="/Images/D7_BlancoMorado.png" data-id="7"></div>
            </div>

            <button class="flecha-derecha">&#10095</button>
        </div>

        <button class="Ver-Todo" onclick="abrirArmario()">Ver Todo</button>

        <div class="armariocompleto" id="armariocompleto">
            <span class="cerrar" onclick="cerrarArmario()">&times</span>
            <div class="ropacompleta">
                <img src="/Images/D1_BlancoMorado.png" data-id="1">
                <img src="/Images/D2_BlancoMorado.png" data-id="2">
                <img src="/Images/D3_BlancoMorado.png" data-id="3">
                <img src="/Images/D4_BlancoMorado.png" data-id="4">
                <img src="/Images/D5_BlancoMorado.png" data-id="5">
                <img src="/Images/D6_BlancoMorado.png" data-id="6">
                <img src="/Images/D7_BlancoMorado.png" data-id="7">
            </div>
        </div>

        <div class="ropa-producto" id="ropaProducto">
        <div class="contenido-ropa">
            <span class="cerrar-producto" id="cerrarProducto">&times;</span>
            <div class="detalle-producto">
                <img id="imagenRopa" src="" alt="Producto">
                <div class="informacion-producto">
                    <h3 id="tituloRopa">Nombre</h3>
                    <p id="descripcionRopa">Descripcion</p>
                    <p class="precio" id="precioRopa">$Precio</p>

                    <div class="selector-colores" id="selectorColores">
                        <p class="texto-color">Color:</p>
                        <div class="opciones-colores" id="opcionesColores"></div>
                    </div>

                    <a id="linkWhatsapp" href="#" target="_blank" class="boton-wpp">Solicitar Compra</a>
                </div>
            </div>
        </div>
    </div>
    </section>
   
    <!--Seccion 3: Final-->
    <section class="InfoFinal" id="InfoFinal">
        <div class="contenido-infofinal">
            <div class="bloque-info">
                <h2>Nosotros</h2>
                <p>
                    Aquí irá la descripción de nosotros.
                </p>
            </div>

            <div class="bloque-info">
                <h2>Contactanos</h2>
                <p>+57 300 000 0000</p>
                <p>+57 300 000 0000</p>
            </div>
        </div>
    </section>
    
    <script src="FuntionalityHome.js"></script>
</body>
</html>
